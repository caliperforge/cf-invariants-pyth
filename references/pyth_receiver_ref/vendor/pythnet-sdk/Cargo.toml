[package]
name = "pythnet-sdk"
version = "2.3.1"
description = "Minimal vendored slice of pythnet/pythnet_sdk for cf-invariants-pyth (Apache-2.0)"
authors = ["Pyth Data Association"]
license = "Apache-2.0"
edition = "2021"

[lib]
crate-type = ["lib"]
name = "pythnet_sdk"

[features]
# Receiver imports pythnet_sdk types via the solana-program feature; we
# keep the same feature name so vendored receiver source compiles 1:1.
# Under our anchor-lang 1.0.1 modular shim, hashers::keccak256_160's
# upstream `solana_program::keccak::hashv` is supplied via the standalone
# `solana-keccak-hasher` 3.x crate (identical API, modular path).
solana-program = ["dep:anchor-lang", "dep:solana-keccak-hasher"]

[dependencies]
bincode = "1.3.3"
# CF-PORT: upstream pins `borsh = "0.10.3"` because its anchor-lang 0.31.x workspace
# also pins borsh 0.10. Under our anchor-lang 1.0.1 modular rails the workspace
# unifies on borsh 1.6, so we vendor at borsh 1.6 to keep MerklePriceUpdate's
# BorshSerialize/Deserialize impl coherent with `AnchorSerialize/Deserialize`
# (anchor 1.0.1's prelude re-export of borsh 1.6's traits). This is the same
# tightest-possible deviation cf-invariants-jito made on its borsh edge.
borsh = { version = "1.6", features = ["derive", "std"] }
bytemuck = { version = "1.11.0", features = ["derive"] }
byteorder = "1.4.3"
hex = { version = "0.4.3", features = ["serde"] }
serde = { version = "1.0.144", features = ["derive"] }
sha3 = "0.10.4"
thiserror = "1.0.40"
anchor-lang = { version = "=1.0.1", optional = true }
solana-keccak-hasher = { version = "3", optional = true }
